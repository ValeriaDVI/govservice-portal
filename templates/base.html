<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GovService Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a3c6e; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { font-size: 1.2rem; }
        nav button { background: transparent; border: 1px solid white; color: white; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    </style>
</head>
<body>
    <nav>
    <h1>🏛 GovService Portal</h1>
    <div style="display:flex; gap:0.5rem">
        <button onclick="window.location.href='/dashboard/'" style="background:transparent; border:1px solid white; color:white; padding:0.4rem 1rem; border-radius:4px; cursor:pointer">Мої заяви</button>
        <button onclick="window.location.href='/officer/'" style="background:transparent; border:1px solid white; color:white; padding:0.4rem 1rem; border-radius:4px; cursor:pointer">Панель офіцера</button>
        <button onclick="logout()" style="background:transparent; border:1px solid white; color:white; padding:0.4rem 1rem; border-radius:4px; cursor:pointer">Вийти</button>
    </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        function logout() {
            localStorage.removeItem('access');
            localStorage.removeItem('refresh');
            window.location.href = '/login/';
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
