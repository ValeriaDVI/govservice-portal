{% extends 'base.html' %}
{% block content %}
<div style="max-width:400px; margin:4rem auto; background:white; padding:2rem; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1)">
    <h2 style="margin-bottom:1.5rem; color:#1a3c6e">Реєстрація</h2>
    <div id="error" style="color:red; margin-bottom:1rem; display:none"></div>
    <input id="username" type="text" placeholder="Логін" style="width:100%; padding:0.7rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:4px; font-size:1rem">
    <input id="email" type="email" placeholder="Email" style="width:100%; padding:0.7rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:4px; font-size:1rem">
    <input id="password" type="password" placeholder="Пароль" style="width:100%; padding:0.7rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:4px; font-size:1rem">
    <select id="role" style="width:100%; padding:0.7rem; margin-bottom:1.5rem; border:1px solid #ddd; border-radius:4px; font-size:1rem">
        <option value="citizen">Громадянин</option>
        <option value="officer">Держслужбовець</option>
    </select>
    <button onclick="register()" style="width:100%; padding:0.8rem; background:#1a3c6e; color:white; border:none; border-radius:4px; font-size:1rem; cursor:pointer">Зареєструватися</button>
    <p style="text-align:center; margin-top:1rem; font-size:0.9rem">Вже є акаунт? <a href="/login/" style="color:#1a3c6e">Увійти</a></p>
</div>
{% endblock %}
{% block scripts %}
<script>
async function register() {
    const res = await fetch('/api/users/register/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value,
        })
    });
    const data = await res.json();
    if (res.ok) {
        window.location.href = '/login/';
    } else {
        const err = document.getElementById('error');
        err.style.display = 'block';
        err.textContent = Object.values(data).flat().join(' ');
    }
}
</script>
{% endblock %}
